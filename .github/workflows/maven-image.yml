name: Maven — build & push image to GHCR

#
# Builds the Hermes image ONCE on every push to maven-main and pushes it to
# the GitHub Container Registry. Per-customer Coolify deployments then PULL
# this pre-built image instead of doing their own 10-minute Docker build on
# the VPS (which is unsustainable past 1-2 customers — see Maven PROGRESS.md
# session 4 entry).
#
# Image location after first successful run:
#   ghcr.io/<owner>/maven-hermes:latest
#   ghcr.io/<owner>/maven-hermes:maven-main-<sha>      (immutable per commit)
#   ghcr.io/<owner>/maven-hermes:sha-<short>           (short-sha alias)
#
# Make the resulting GHCR package PUBLIC once after the first run:
#   GitHub → Profile → Packages → maven-hermes → Package settings → Change visibility → Public
# That lets Coolify pull anonymously. (Private requires a registry credential
# in Coolify — extra step we don't need.)
#
# Separate from the upstream `.github/workflows/docker-publish.yml` because:
#   1. That workflow has `if: github.repository == 'NousResearch/hermes-agent'`
#      so it doesn't run on forks.
#   2. Upstream pushes to Docker Hub as nousresearch/hermes-agent — different
#      registry, different image name, different secret scheme.
#   3. Keeping them separate means upstream merges don't touch our workflow.
#

on:
  push:
    branches: [maven-main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Don't cancel an in-flight build when a newer push arrives — every commit
# gets its own SHA-tagged immutable image even if :latest gets superseded.
concurrency:
  group: maven-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=maven-main-${{ github.sha }}
            type=sha,format=short

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache keeps incremental builds fast across runs.
          cache-from: type=gha,scope=maven-image
          cache-to: type=gha,mode=max,scope=maven-image
