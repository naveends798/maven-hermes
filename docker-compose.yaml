#
# docker-compose.yml — Maven fork of Hermes Agent
#
# This file diverges from upstream NousResearch/hermes-agent in four ways:
#
#   1. Bridge networking instead of `network_mode: host`, so multiple Hermes
#      containers can coexist on one VPS for Maven's multi-tenant model.
#   2. Named volume `hermes_data` instead of `~/.hermes` bind mount, so
#      Coolify manages volume lifecycle per customer.
#   3. `container_name:` removed so Docker auto-generates unique names per
#      Coolify project (avoids collisions across customer deployments).
#   4. Dashboard binds 0.0.0.0 instead of 127.0.0.1 — Coolify+Traefik basic-auth
#      MUST sit in front. NEVER deploy without the basic-auth middleware.
#      See Maven's infra/coolify-bootstrap.md Step 7.
#
# Upstream security warnings still apply — comments preserved inline.
#
services:
  gateway:
    build: .
    image: hermes-agent
    restart: unless-stopped
    volumes:
      - hermes_data:/opt/data
    ports:
      - "8000:8000"
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      # Maven: OpenAI-compatible API server ENABLED, bearer-token auth required.
      # API_SERVER_KEY is set in Coolify env vars (encrypted).
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${API_SERVER_KEY}
      # Microsoft Teams — uncomment and fill in to enable Teams gateway.
      # - TEAMS_CLIENT_ID=${TEAMS_CLIENT_ID}
      # - TEAMS_CLIENT_SECRET=${TEAMS_CLIENT_SECRET}
      # - TEAMS_TENANT_ID=${TEAMS_TENANT_ID}
      # - TEAMS_ALLOWED_USERS=${TEAMS_ALLOWED_USERS}
      # - TEAMS_PORT=${TEAMS_PORT:-3978}
      # Google Chat — see upstream docker-compose.yml for full setup.
      # - GOOGLE_CHAT_PROJECT_ID=${GOOGLE_CHAT_PROJECT_ID}
      # - GOOGLE_CHAT_SUBSCRIPTION_NAME=${GOOGLE_CHAT_SUBSCRIPTION_NAME}
      # - GOOGLE_CHAT_SERVICE_ACCOUNT_JSON=${GOOGLE_CHAT_SERVICE_ACCOUNT_JSON}
      # - GOOGLE_CHAT_ALLOWED_USERS=${GOOGLE_CHAT_ALLOWED_USERS}
    command: ["gateway", "run"]

  dashboard:
    image: hermes-agent
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - hermes_data:/opt/data
    ports:
      - "9119:9119"
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
    # Maven: dashboard binds 0.0.0.0 INTENTIONALLY.
    # Coolify+Traefik basic-auth MUST be configured in front of the public domain.
    # Never deploy this fork without the basic-auth middleware — see Maven's infra/coolify-bootstrap.md Step 7.
    command: ["dashboard", "--host", "0.0.0.0", "--no-open"]

volumes:
  hermes_data:
