#
# docker-compose.yml — Maven fork of Hermes Agent
#
# Diverges from upstream NousResearch/hermes-agent:
#   1. Bridge networking instead of `network_mode: host` for multi-tenancy.
#   2. Named volume `hermes_data` for Coolify-managed persistence.
#   3. `container_name:` removed for unique per-project naming.
#   4. Dashboard binds 0.0.0.0 with --insecure (Traefik basic-auth in front).
#   5. API server explicitly ENABLED with API_SERVER_ENABLED=true.
#
# `expose:` (not `ports:`) so containers route via Docker network without
# publishing to host (avoids host port conflicts with Coolify).
# API server default port is 8642 per Hermes docs.
#
services:
  gateway:
    build: .
    image: hermes-agent
    restart: unless-stopped
    volumes:
      - hermes_data:/opt/data
    expose:
      - "8642"
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${API_SERVER_KEY}
      # Microsoft Teams — uncomment and fill in to enable Teams gateway.
      # - TEAMS_CLIENT_ID=${TEAMS_CLIENT_ID}
      # - TEAMS_CLIENT_SECRET=${TEAMS_CLIENT_SECRET}
      # - TEAMS_TENANT_ID=${TEAMS_TENANT_ID}
      # - TEAMS_ALLOWED_USERS=${TEAMS_ALLOWED_USERS}
      # - TEAMS_PORT=${TEAMS_PORT:-3978}
      # Google Chat — see upstream docker-compose.yml for full setup.
      # - GOOGLE_CHAT_PROJECT_ID=${GOOGLE_CHAT_PROJECT_ID}
      # - GOOGLE_CHAT_SUBSCRIPTION_NAME=${GOOGLE_CHAT_SUBSCRIPTION_NAME}
      # - GOOGLE_CHAT_SERVICE_ACCOUNT_JSON=${GOOGLE_CHAT_SERVICE_ACCOUNT_JSON}
      # - GOOGLE_CHAT_ALLOWED_USERS=${GOOGLE_CHAT_ALLOWED_USERS}
    command: ["gateway", "run"]

  dashboard:
    image: hermes-agent
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - hermes_data:/opt/data
    expose:
      - "9119"
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--insecure"]

volumes:
  hermes_data:
