#
# docker-compose.yml — Maven fork of Hermes Agent
#
# Diverges from upstream NousResearch/hermes-agent:
#   1. Bridge networking instead of `network_mode: host` for multi-tenancy.
#   2. Named volume `hermes_data` for Coolify-managed persistence.
#   3. `container_name:` removed for unique per-project naming.
#   4. Dashboard binds 0.0.0.0 with --insecure (Traefik basic-auth eventually).
#   5. API server explicitly ENABLED on default port 8642.
#   6. Telegram credentials passed via env (set in Coolify).
#
# `expose:` (not `ports:`) so containers route via Docker network without
# publishing to host.
#
services:
  gateway:
    build: .
    image: hermes-agent
    restart: unless-stopped
    volumes:
      - hermes_data:/opt/data
    expose:
      - "8642"
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${API_SERVER_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
    command: ["gateway", "run"]

  dashboard:
    image: hermes-agent
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - hermes_data:/opt/data
    expose:
      - "9119"
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--insecure"]
    # Self-contained Traefik labels for agent.aicmo.in with basic auth.
    # Leave Coolify's "Domains for dashboard" field EMPTY — these labels
    # define the router themselves to avoid conflicting with Coolify's
    # auto-generated ones.
    #
    # NOTE on the htpasswd `$`: Coolify v4 passes label values through to
    # Docker as-is without running docker-compose's `$$ → $` interpolation
    # step, so we write single `$` here (NOT `$$`). If you ever run this
    # compose via plain `docker compose up`, you'd need to double them.
    # Regenerate the hash per-customer in M2's template.
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.maven-self-auth.basicauth.users=maven-self:$2y$05$/Y9mC9Mdhiu7iAHz1NPvCORBe2dHnT.l.yjCXfi6osSy//3.ST4oa"
      - "traefik.http.routers.maven-self-dashboard-http.entrypoints=http"
      - "traefik.http.routers.maven-self-dashboard-http.rule=Host(`agent.aicmo.in`)"
      - "traefik.http.routers.maven-self-dashboard-http.middlewares=redirect-to-https"
      - "traefik.http.routers.maven-self-dashboard-https.entrypoints=https"
      - "traefik.http.routers.maven-self-dashboard-https.rule=Host(`agent.aicmo.in`)"
      - "traefik.http.routers.maven-self-dashboard-https.tls=true"
      - "traefik.http.routers.maven-self-dashboard-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.maven-self-dashboard-https.middlewares=gzip,maven-self-auth"
      - "traefik.http.routers.maven-self-dashboard-https.service=maven-self-dashboard-svc"
      - "traefik.http.services.maven-self-dashboard-svc.loadbalancer.server.port=9119"

volumes:
  hermes_data:
