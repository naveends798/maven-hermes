#
# docker-compose.yaml — Maven fork of Hermes Agent
#
# This compose is fully parameterized via ${VARS} so the same fork
# branch (maven-main) can be deployed once per customer in Coolify,
# with each customer's identity / domain / secrets supplied via that
# project's Environment Variables panel.
#
# Required per-customer env vars (set in Coolify):
#
#   CUSTOMER_SLUG                lowercase ascii; prefixes all Traefik names
#                                so customers don't collide on the same proxy.
#                                e.g. "cust2", "acme-coaching", "maven-self"
#
#   CUSTOMER_DASHBOARD_HOST      hostname that serves Hermes's web dashboard
#                                e.g. "cust2.aicmo.in" or "agent.aicmo.in"
#
#   CUSTOMER_API_HOST            hostname that serves Hermes's OpenAI-compat API
#                                e.g. "api.cust2.aicmo.in" or "api.aicmo.in"
#                                (separate from DASHBOARD_HOST to support both
#                                 the "domain + api.<domain>" pattern AND the
#                                 "peer subdomains" pattern maven-self uses.)
#
#   CUSTOMER_DASHBOARD_HTPASSWD  full htpasswd line "<user>:<bcrypt-hash>"
#                                Generate with: htpasswd -nbB <user> <password>
#                                IMPORTANT: write single `$` characters, not `$$`
#                                — Coolify v4 passes labels to Docker as-is
#                                without running docker-compose's $$->$ step.
#
#   API_SERVER_KEY               bearer token for the Hermes API. Generate
#                                with: openssl rand -hex 32
#
#   TELEGRAM_BOT_TOKEN           optional; from @BotFather
#   TELEGRAM_ALLOWED_USERS       optional; comma-separated Telegram user IDs
#
#   HERMES_UID, HERMES_GID       container uid/gid; default 10000
#
# Diverges from upstream NousResearch/hermes-agent:
#   1. Bridge networking instead of `network_mode: host` for multi-tenancy.
#   2. Named volume `hermes_data` for Coolify-managed persistence.
#   3. `container_name:` removed for unique per-project naming.
#   4. Dashboard binds 0.0.0.0 with --insecure (Traefik basic-auth in front).
#   5. API server explicitly ENABLED on default port 8642.
#   6. Telegram credentials passed via env (set in Coolify).
#   7. Self-contained Traefik labels for both services so Coolify's
#      "Domains for ..." UI fields can stay EMPTY (avoids competing routers).
#   8. Uses PRE-BUILT image from GHCR (no `build: .` here). The image is
#      built once per maven-main commit by .github/workflows/maven-image.yml
#      and pushed to ghcr.io/naveends798/maven-hermes:latest. This makes
#      per-customer Coolify deploys a 30-second image pull instead of a
#      10-15 minute Docker build on the VPS (which is unsustainable past
#      1-2 simultaneous deploys — see Maven PROGRESS.md M2.5 entry).
#
services:
  gateway:
    image: ghcr.io/naveends798/maven-hermes:latest
    pull_policy: always
    restart: unless-stopped
    volumes:
      - hermes_data:/opt/data
    expose:
      - "8642"
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${API_SERVER_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
    command: ["gateway", "run"]
    labels:
      # API server on api.cust2.aicmo.in — bearer-token gated, no basic auth.
      # Values are HARDCODED (not ${VAR}) because Coolify v4 escapes $ in
      # compose label values, breaking interpolation. M3+ admin app will
      # generate per-customer branches with literal values like this one.
      - "traefik.enable=true"
      - "traefik.http.routers.cust2-api-http.entrypoints=http"
      - "traefik.http.routers.cust2-api-http.rule=Host(`api.cust2.aicmo.in`)"
      - "traefik.http.routers.cust2-api-http.middlewares=redirect-to-https"
      - "traefik.http.routers.cust2-api-https.entrypoints=https"
      - "traefik.http.routers.cust2-api-https.rule=Host(`api.cust2.aicmo.in`)"
      - "traefik.http.routers.cust2-api-https.tls=true"
      - "traefik.http.routers.cust2-api-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cust2-api-https.service=cust2-api-svc"
      - "traefik.http.services.cust2-api-svc.loadbalancer.server.port=8642"

  dashboard:
    image: ghcr.io/naveends798/maven-hermes:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      - gateway
    volumes:
      - hermes_data:/opt/data
    expose:
      - "9119"
    environment:
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--insecure"]
    # Dashboard NOT publicly routed in this customer-cust2 branch.
    # Reason: Coolify v4 corrupts $-containing values (bcrypt hashes) when
    # passed through compose env-var interpolation. The htpasswd literal
    # approach maven-self uses would work but means committing the bcrypt
    # hash to the fork's public repo. Acceptable for maven-self (already
    # in maven-main) but we'd rather not commit hashes per customer.
    # Operator accesses cust2's dashboard via SSH tunnel if needed:
    #   ssh -L 9119:<cust2-dashboard-container-ip>:9119 root@<vps>
    # M2.6 followup: wire customer basic-auth via Coolify's "Custom Labels"
    # panel (per-customer, not committed), or build admin-app middleware.

volumes:
  hermes_data:
